                name: I want to use
              - entity: input_number.hba_strategy_dynamic_v2_max_cheap_hours_per_day
                name: Max # cheap hrs
          - type: heading
            icon: mdi:timeline-clock-outline
            heading: Expensive periods
            heading_style: subtitle
          - type: entities
            entities:
              - entity: input_select.hba_strategy_dynamic_expensive
                name: I want to use
              - entity: input_number.hba_strategy_dynamic_v2_max_expensive_hours_per_day
                name: Max # expensive hrs

      # ── Price marks visualisation ─────────────────────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading: FEAT | Price marks visualisation
            heading_style: title
            icon: mdi:chart-bar
          - type: markdown
            content: >-
              <small><small>


              | Time | Today ¢ | Mark | Trend | · | Tomorrow ¢ | Mark | Trend |

              |:---:|---:|:---:|:---:|:---:|---:|:---:|:---:|

              {% set s = 'sensor.hba_energy_prices_data' %}

              {%- set prices = state_attr(s, 'prices') or [] -%}

              {%- set marks_raw = state_attr(s, 'marks') -%}
              {%- set marks  = (marks_raw | from_json) if marks_raw is string and marks_raw | trim != '' else (marks_raw or []) -%}

              {%- set pph    = state_attr(s, 'datapoints_per_hour') | default(1, true) | int -%}

              {%- set ppd    = 24 * pph -%}

              {%- set step   = (60 / pph) | int -%}

              {%- set bars   = ['▁','▂','▃','▄','▅','▆','▇','█'] -%}

              {%- set t_prices = prices[:ppd] if (prices | length) >= ppd else prices -%}
              {%- set m_prices = prices[ppd:ppd*2] if (prices | length) >= ppd*2 else [] -%}
              {%- set t_pmin = (t_prices | min) if t_prices else 0 -%}
              {%- set t_pmax = (t_prices | max) if t_prices else 0 -%}
              {%- set t_rng  = t_pmax - t_pmin -%}
              {%- set m_pmin = (m_prices | min) if m_prices else 0 -%}
              {%- set m_pmax = (m_prices | max) if m_prices else 0 -%}
              {%- set m_rng  = m_pmax - m_pmin -%}

              {%- set current_idx = now().hour * pph + (now().minute // step) -%}

              {%- if prices and (prices | length) >= ppd -%}
                {%- for i in range(ppd) -%}
                  {%- set t_price   = prices[i] -%}
                  {%- set t_idx     = i + ppd -%}
                  {%- set tom_price = prices[t_idx] if (prices | length) > t_idx else none -%}
                  {%- set hour      = (i // pph) | int -%}
                  {%- set minute    = (i % pph) * step -%}
                  {%- set t_mark    = marks[i].mark if (marks | length) > i else none -%}
                  {%- set tom_mark  = marks[t_idx].mark if (marks | length) > t_idx else none -%}
                  {%- set t_bar     = bars[((t_price - t_pmin) / t_rng * 7) | round(0) | int] if t_rng > 0 else bars[0] -%}
                  {%- set tom_bar   = (bars[((tom_price - m_pmin) / m_rng * 7) | round(0) | int] if (tom_price is not none and m_rng > 0) else (bars[0] if tom_price is not none else '-')) -%}
                  {%- set t_emoji   = '🟠' if t_mark == 'high' else ('🟢' if t_mark == 'low' else '—') -%}
                  {%- set tom_emoji = '🟠' if tom_mark == 'high' else ('🟢' if tom_mark == 'low' else ('—' if tom_price is not none else '-')) -%}
                  | {% if i == current_idx %}<font color="#009ac7">{{ "%02d"|format(hour) }}:{{ "%02d"|format(minute) }}</font>{% else %}{{ "%02d"|format(hour) }}:{{ "%02d"|format(minute) }}{% endif %} | {% if i == current_idx %}<font color="#009ac7">{{ "%0.1f"|format(t_price) }}</font>{% elif t_mark == 'high' %}<font color="orange">{{ "%0.1f"|format(t_price) }}</font>{% elif t_mark == 'low' %}<font color="#4caf50">{{ "%0.1f"|format(t_price) }}</font>{% else %}{{ "%0.1f"|format(t_price) }}{% endif %} | {{ t_emoji }} | {% if i == current_idx %}<font color="#009ac7">{{ t_bar }}</font>{% elif t_mark == 'high' %}<font color="orange">{{ t_bar }}</font>{% elif t_mark == 'low' %}<font color="#4caf50">{{ t_bar }}</font>{% else %}{{ t_bar }}{% endif %} | | {% if tom_price is not none %}{% if tom_mark == 'high' %}<font color="orange">{{ "%0.1f"|format(tom_price) }}</font>{% elif tom_mark == 'low' %}<font color="#4caf50">{{ "%0.1f"|format(tom_price) }}</font>{% else %}{{ "%0.1f"|format(tom_price) }}{% endif %}{% else %}-{% endif %} | {{ tom_emoji }} | {% if tom_mark == 'high' %}<font color="orange">{{ tom_bar }}</font>{% elif tom_mark == 'low' %}<font color="#4caf50">{{ tom_bar }}</font>{% else %}{{ tom_bar }}{% endif %} |
                {% endfor %}
              {%- else -%}
                | - | *Insufficient data available...* | - | - | | - | - | - |
              {% endif %}


              **Today**
              Range: {{ "%0.1f"|format(t_pmin) }} – {{ "%0.1f"|format(t_pmax) }} ¢
              Spread: {{ "%0.1f"|format(t_rng) }} ¢

              {%- if m_prices %}

              **Tomorrow**
              Range: {{ "%0.1f"|format(m_pmin) }} – {{ "%0.1f"|format(m_pmax) }} ¢
              Spread: {{ "%0.1f"|format(m_rng) }} ¢
              {%- endif %}


              </small></small>

      # ── Price chart ──────────────────────────────────────────────────────────
      - type: grid
        column_span: 2
        cards:
          - type: custom:apexcharts-card
            header:
              show: true
              show_states: false
              title: Price intervals
            graph_span: 48h
            span:
              start: day
            now:
              show: true
              color: '#009ac7'
              label: Now
            apex_config:
              plotOptions:
                bar:
                  borderRadius: 2
                  columnWidth: 90%
              legend:
                show: false
              xaxis:
                type: datetime
                labels:
                  datetimeUTC: false
                  format: HH:mm
                  rotate: -45
                  rotateAlways: true
              yaxis:
                decimalsInFloat: 1
                title:
                  text: ¢/kWh
              tooltip:
                x:
                  format: ddd dd MMM HH:mm
            series:
              - entity: sensor.hba_energy_prices_data
                name: Price
                type: column
                float_precision: 1
                show:
                  legend_value: false
                data_generator: |
                  const marksRaw = entity.attributes.marks || [];
                  const marks = typeof marksRaw === 'string' ? JSON.parse(marksRaw) : marksRaw;
                  const colours = { high: '#ff9800', low: '#4caf50' };
                  return marks.map(iv => ({
                    x: new Date(iv.start).getTime(),
                    y: iv.price,
                    fillColor: iv.is_now
                      ? '#009ac7'
                      : (colours[iv.mark] || '#9e9e9e')
                  }));
