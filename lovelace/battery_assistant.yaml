                  name: Today the tariff is
                  type: simple-entity
          - type: markdown
            content: >-
              <ha-alert title="SKIPPING cheapest period">You have set a price
              limit for the cheapest period. The cheapest period is too
              expensive today.</ha-alert>
            text_only: true
            visibility:
              - condition: state
                entity: binary_sensor.hba_dynamic_cheap_threshold_met
                state: 'off'
              - condition: state
                entity: input_select.hba_strategy
                state_not: "Dynamic v2"
          - type: heading
            icon: mdi:timeline-clock-outline
            heading: Expensive period
            heading_style: subtitle
          - type: entities
            entities:
              - entity: input_select.hba_strategy_dynamic_expensive
