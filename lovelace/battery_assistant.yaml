  # ── VIEW 2: SELF-CONSUMPTION (PID) ──────────────────────────────────────────
  - type: sections
    max_columns: 3
    icon: mdi:transmission-tower-off
    path: self-consumption
    title: Self-consumption
    cards: []
    badges:
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: input_select.hba_strategy
        name: Choose strategy
        tap_action:
          action: more-info
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.hba_active_strategy
        show_entity_picture: false
        name: Executing
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: input_text.hba_strategy_active_flow
        show_entity_picture: false
        name: Flow
    header:
      layout: center
      badges_position: top
      badges_wrap: scroll
      card:
        type: markdown
        content: >-
          ### Self-consumption strategy *(HBA v4.10.0-r1)*

          The **PID controller** steers your batteries to keep grid usage near
          target, _e.g. 0 Watt_, and is used by:

          _Self-consumption, Charge PV, Charge (regulated), Peak shaving and
          more..._
        text_only: true
    sections:
      - type: grid
        cards:
          - type: heading
            heading: PID controller (advanced settings)
            heading_style: title
            icon: mdi:cog-box
          - type: markdown
            content: >-
              <font color="grey"><i>These settings tune how aggressive the
              system tries to keep the grid power at the desired power level.
              Too aggressive is unstable! Too safe will cost efficiency. This
              PID control could outperform Vendor made software — community
              feedback from HBC is promising, but HBA uses a new implementation,
              so time will tell.

              </i></font>
            text_only: true
          - type: heading
            icon: mdi:information
            heading: Help | setup and tuning PID control
            heading_style: subtitle
            tap_action:
              action: url
              url_path: >-
                https://docs.homebatterycontrol.com/04-setup-self-consumption.html
          - type: markdown
            content: >-
              <ha-alert alert-type="warning">High controller sensitivity,
              monitor your system.</ha-alert>
            visibility:
              - condition: or
                conditions:
                  - condition: numeric_state
                    entity: input_number.hba_control_kp
                    above: 0.5
                  - condition: numeric_state
                    entity: input_number.hba_control_ki
                    above: 0.5
                  - condition: numeric_state
                    entity: input_number.hba_control_kd
                    above: 0.5
                  - condition: numeric_state
                    entity: input_number.hba_control_error_signal_dampening
                    above: 70
                  - condition: numeric_state
                    entity: input_number.hba_control_pid_output_dampening
                    above: 50
            text_only: true
          - type: entities
            entities:
              - entity: input_select.hba_control_pid_presets
                name: PID presets
              - entity: input_number.hba_control_kp
                name: Proportional gain (Kp)
              - entity: input_number.hba_control_ki
                name: Integral gain (Ki)
              - entity: input_number.hba_control_kd
                name: Differential gain (Kd)
              - entity: input_number.hba_control_error_signal_dampening
                name: Input smoothing
                secondary_info: none
              - entity: input_number.hba_control_pid_output_dampening
                name: Output smoothing
              - entity: input_number.hba_target_grid_consumption_in_w
                name: Target grid consumption
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: PID history
            heading_style: title
            icon: mdi:cog-box
          - type: markdown
            content: >-
              <font color="grey"><i>Use **PID History** for tuning. It shows the
              internal controller values:


              * **Input (W):** Grid power error (Current vs. Desired)

              * **Output (W):** Target battery power

              * **Output (W):** P-term + I-term + D-term


              </i></font>
            text_only: true
            grid_options:
              columns: full
          - title: PID analysis
            type: history-graph
            entities:
              - entity: input_number.hba_control_pid_output
                name: PID output
              - entity: sensor.p1_meter_power
                name: Grid power
              - entity: input_number.hba_control_error_signal
                name: PID input
              - entity: input_number.hba_control_p_term
                name: P-term
              - entity: input_number.hba_control_i_term
                name: I-term
              - entity: input_number.hba_control_d_term
                name: D-term
            grid_options:
              columns: full
            hours_to_show: 0.025
          - type: markdown
            content: >-
              <font color="grey"><i>Click on the labels in the legend to turn
              individual graphs on/off

              </i></font>
            text_only: true
            grid_options:
              columns: full

