              - entity: input_number.hba_strategy_dynamic_expensive_hrs
                name: During the most expensive
              - entity: input_number.hba_strategy_dynamic_threshold_delta
                name: If the price delta >=
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_select.hba_strategy
                    state_not: "Dynamic v2"
                row:
                  entity: input_datetime.hba_strategy_dynamic_expensive_start
                  name: Start
                  type: simple-entity
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_select.hba_strategy
                    state_not: "Dynamic v2"
                row:
                  entity: input_datetime.hba_strategy_dynamic_expensive_end
                  name: End
                  type: simple-entity
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_select.hba_strategy
                    state_not: "Dynamic v2"
                row:
                  entity: input_number.hba_strategy_dynamic_expensive_avg_delta
                  name: Today the price delta is
                  type: simple-entity
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_select.hba_strategy_dynamic_expensive
                    state: "Sell"
                row:
                  entity: sensor.estimated_profit_per_kwh
                  name: Estimated profit per kWh
                  type: simple-entity
                  icon: mdi:currency-eur
          - type: markdown
            content: >-
              <ha-alert title="SKIPPING expensive period">You have set a
              minimum price delta. The price difference between the expensive
              and cheapest period is too small. Discharging is not
              economical.</ha-alert>
            text_only: true
            visibility:
              - condition: state
                entity: binary_sensor.hba_dynamic_expensive_threshold_met
                state: 'off'
              - condition: state
                entity: input_select.hba_strategy
                state_not: "Dynamic v2"
          - type: heading
            icon: mdi:information
            heading: Calculated periods and tariffs
            heading_style: subtitle
            tap_action:
              action: url
              url_path: >-
                https://docs.homebatterycontrol.com/05-setup-dynamic.html#period-startend-times-read-only
            visibility:
              - condition: state
                entity: input_select.hba_strategy
                state_not: "Dynamic v2"
          - show_name: true
            show_icon: true
            show_state: true
            type: glance
            entities:
              - entity: input_number.hba_strategy_dynamic_expensive_avg_tariff
                type: simple-entity
                name: Expensive period
              - entity: input_number.hba_strategy_dynamic_cheapest_avg_tariff
                type: simple-entity
                name: Charged at
              - entity: input_number.hba_strategy_dynamic_expensive_avg_delta
                type: simple-entity
                name: Price delta
            visibility:
              - condition: state
                entity: input_select.hba_strategy
                state_not: "Dynamic v2"

  # ── VIEW 5: INSIGHTS (DEBUG) ────────────────────────────────────────────────
  - type: sections
    max_columns: 3
    title: Insights
    path: insights
    icon: mdi:spider-outline
    cards: []
    badges:
      - type: entity
        show_name: true
        show_state: false
        show_icon: true
        entity: input_boolean.hba_control_is_debug_mode
        tap_action:
          action: toggle
        name: Insights mode
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: input_select.hba_strategy
        name: Choose strategy
        tap_action:
          action: more-info
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.hba_active_strategy
        show_entity_picture: false
        name: Executing
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: input_text.hba_strategy_active_flow
        show_entity_picture: false
        name: Flow
    header:
      layout: center
      badges_position: top
      badges_wrap: scroll
      card:
        type: markdown
        text_only: true
        content: >-
          ### Insights *(HBA v4.10.0-r1)*

          Need help figuring out what is going on?

          Hit **Insights mode** to toggle debug entities.
          📘 [Troubleshooting
          documentation](https://docs.homebatterycontrol.com/07-troubleshooting.html)
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Flows used
            heading_style: title
            icon: mdi:sitemap
          - type: markdown
            content: |-
              {% set strategy = states('input_select.hba_strategy') -%}
              {% set executing = states('input_text.hba_strategy_active_flow') -%}
              {% set parts = executing.split(' → ') if executing not in ['', 'unknown', 'unavailable'] else [] -%}
              {% set skip_first = parts | length > 0 and parts[0] == strategy -%}
              {% set show_parts = parts[1:] if skip_first else parts -%}
              Control loop
              &nbsp;↳ {{ strategy }}
              {%- for part in show_parts %}
              {{ '&nbsp;&nbsp;' * loop.index ~ '&nbsp;' }}↳ {{ part }}
              {%- endfor %}
          - type: heading
            heading: Controller state
            heading_style: title
            icon: mdi:list-status
          - type: markdown
            content: |-
              {% set grid = states('sensor.p1_meter_power') | float(0) -%}
              {% set target = states('input_number.hba_target_grid_consumption_in_w') | float(0) -%}
              {% set err = grid - target -%}
              {% set ev_e = states('input_text.hba_strategy_ev_sensor_entity_id') | trim -%}
              {% set p1_age = (as_timestamp(now()) - as_timestamp(states['sensor.p1_meter_power'].last_changed)) | int -%}
              {% set has_imp = is_state('input_boolean.hba_control_has_power_limit_import', 'on') -%}
              {% set has_exp = is_state('input_boolean.hba_control_has_power_limit_export', 'on') -%}
              {% set imp_lim = states('input_number.hba_control_power_limit_import') | float(0) | int -%}
              {% set exp_lim = states('input_number.hba_control_power_limit_export') | float(0) | int -%}
              **Grid:** {% if grid > 0 %}Import **{{ grid | round(0) | int }} W** from grid{% elif grid < 0 %}Export **{{ (grid | abs) | round(0) | int }} W** to grid{% else %}Measuring ({{ grid | int }} W){% endif %} | **P1:** {{ p1_age }}s ago

              **Error:** {{ err | round(0) | int }} W (target {{ target | int }} W)
              **Deadband:** {% if err | abs < 15 %}✅ inside ±15 W{% else %}⚡ outside — {{ err | abs | round(0) | int }} W from setpoint{% endif %}

              **{{ states('input_select.hba_strategy') }} strategy** | Executing: **{{ states('sensor.hba_active_strategy') }}** | Flow: **{{ states('input_text.hba_strategy_active_flow') }}**

              **PID cycle:** {{ states('input_text.hba_control_cycle_state') }}

              {% if has_imp or has_exp -%}
              **Peak shaving:** {% if has_imp %}import ≤ {{ imp_lim }} W{% if grid > imp_lim %} 🔴 clamping{% else %} 🟢{% endif %}{% endif %}{% if has_imp and has_exp %} / {% endif %}{% if has_exp %}export ≤ {{ exp_lim }} W{% if grid < 0 and (grid | abs) > exp_lim %} 🔴 clamping{% else %} 🟢{% endif %}{% endif %}

              {% endif -%}
              **EV stop:** {{ states(ev_e) if ev_e not in ['','unknown','unavailable'] else '_not configured_' }}
          - type: heading
            heading: System state
            heading_style: title
            icon: mdi:information-outline
          - type: entities
            entities:
              - entity: binary_sensor.hba_is_charging
                name: System charging
              - entity: binary_sensor.hba_charge_goal_reached
                name: Charge goal reached
              - entity: input_number.hba_control_prioritize_battery
                name: Priority battery
            show_header_toggle: false

      - type: grid
        cards:
          - type: heading
            heading: Battery connectivity
            heading_style: title
            icon: mdi:lan-connect
          - type: markdown
            content: |-
              {% set count = states('input_number.hba_battery_count') | int(1) -%}
              {%- for idx in range(1, count + 1) %}
              {%- set inv = states('sensor.marstek_m' ~ idx ~ '_inverter_state') -%}
              {%- set ok = inv not in ['unavailable', 'unknown', ''] %}
              {{ '🟢' if ok else '🔴' }} **M{{ idx }}** — {{ inv if ok else 'offline / unavailable' }}
              {%- endfor %}
          - type: heading
            heading: Battery aggregates
            heading_style: title
            icon: mdi:battery-outline
          - type: entities
            entities:
              - entity: sensor.hba_total_battery_power
                name: Actual power (measured)
              - entity: sensor.hba_total_commanded_power
                name: Commanded power (HBA)
              - entity: sensor.hba_charge_available_energy
                name: Available energy
              - entity: sensor.hba_total_max_charge_power
                name: Max charge power
              - entity: sensor.hba_total_max_discharge_power
                name: Max discharge power
              - entity: sensor.hba_time_remaining
                name: Time remaining (discharge)
            show_header_toggle: false

      - type: grid
        cards:
          - type: heading
            heading: Power history
            heading_style: title
            icon: mdi:chart-line
          - type: history-graph
            entities:
              - entity: sensor.p1_meter_power
                name: Grid (P1)
              - entity: sensor.hba_total_battery_power
                name: Batteries
            hours_to_show: 1
          - type: heading
            heading: Insights
            heading_style: title
            icon: mdi:magnify
            visibility:
              - condition: state
                entity: input_boolean.hba_control_is_debug_mode
                state: "on"
          - type: markdown
            content: |-
              {% set count = states('input_number.hba_battery_count') | int(1) -%}
              {% set desired = states('sensor.hba_total_commanded_power') | float(0) -%}
              {% set pid_out = states('input_number.hba_control_pid_output') | float(0) -%}
              {% set p_t = states('input_number.hba_control_p_term') | float(0) -%}
              {% set i_t = states('input_number.hba_control_i_term') | float(0) -%}
              {% set d_t = states('input_number.hba_control_d_term') | float(0) -%}
              {% set kp = states('input_number.hba_control_kp') | float(0) -%}
              {% set ki = states('input_number.hba_control_ki') | float(0) -%}
              {% set kd = states('input_number.hba_control_kd') | float(0) -%}
              {% set max_pw = (states('sensor.hba_total_max_charge_power') if desired >= 0 else states('sensor.hba_total_max_discharge_power')) | float(2500) | int -%}
              **PID Controller**
              P {{ p_t | round(0) | int }} W @ gain {{ kp }}
              I {{ i_t | round(0) | int }} W @ gain {{ ki }} (max. {{ max_pw }} W)
              D {{ d_t | round(0) | int }} W @ gain {{ kd }}
              **PID {{ 'Charge' if pid_out > 0 else 'Discharge' }}:** {{ p_t | round(0) | int }} + {{ i_t | round(0) | int }} + {{ d_t | round(0) | int }} = **{{ pid_out | round(0) | int }} W**

              {% set thr1 = states('input_number.hba_control_slow_charge_soc_threshold_1') | float(95) -%}
              {%- set lim1 = states('input_number.hba_control_slow_charge_power_limit_1') | float(0) | int -%}
              {%- set thr2 = states('input_number.hba_control_slow_charge_soc_threshold_2') | float(99) -%}
              {%- set lim2 = states('input_number.hba_control_slow_charge_power_limit_2') | float(0) | int -%}
              {%- set idle_cfg_s = states('input_number.hba_control_idle_time') | float(5) * 60 | int -%}
              **Load distribution** — compensate **{{ desired | abs | round(0) | int }} W** ({{ count }} batter{{ 'y' if count == 1 else 'ies' }})
              {% for idx in range(1, count + 1) -%}
              {%- set priority = states('input_number.hba_control_prioritize_battery') | int(1) -%}
              {%- set soc = states('sensor.marstek_m' ~ idx ~ '_battery_state_of_charge') | float(0) | round(1) -%}
              {%- set soc_min = states('input_number.hba_marstek_m' ~ idx ~ '_discharging_cutoff_capacity') | float(15) | round(0) | int -%}
              {%- set soc_max = states('input_number.hba_marstek_m' ~ idx ~ '_charging_cutoff_capacity') | float(100) | round(0) | int -%}
              {%- set mode = states('select.marstek_m' ~ idx ~ '_forcible_charge_discharge') -%}
              {%- set rs485 = states('select.marstek_m' ~ idx ~ '_rs485_control_mode') -%}
              {%- set last_ts = as_timestamp(states('input_datetime.hba_last_active_m' ~ idx)) | float(0) -%}
              {%- set idle_s = (as_timestamp(now()) - last_ts) | int if last_ts > 0 else -1 -%}
              {%- set idle_str = (idle_s // 60) ~ 'm ' ~ (idle_s % 60) ~ 's' if idle_s >= 0 else '?' -%}
              {%- set over_idle = idle_s >= idle_cfg_s if idle_s >= 0 else false -%}
              {%- if mode == 'charge' -%}
              {%- set power = states('number.marstek_m' ~ idx ~ '_forcible_charge_power') | float(0) | int -%}
              {%- set hw_max = states('number.marstek_m' ~ idx ~ '_max_charge_power') | float(2500) | int -%}
              {%- elif mode == 'discharge' -%}
              {%- set power = states('number.marstek_m' ~ idx ~ '_forcible_discharge_power') | float(0) | int -%}
              {%- set hw_max = states('number.marstek_m' ~ idx ~ '_max_discharge_power') | float(2500) | int -%}
              {%- else -%}
              {%- set power = 0 -%}
              {%- set hw_max = 0 -%}
              {%- endif %}
              **M{{ idx }}**{{ ' ★' if idx == priority else '' }} | RS485: {{ rs485 }} | idle {{ idle_str }}{{ ' ⏸ resting' if over_idle else '' }}
              {{ soc }}% SoC (min: {{ soc_min }}%, max: {{ soc_max }}%)
              {%- if mode == 'stop' %} → **stop**
              {%- else %} → **{{ mode }}** {{ power }}W / {{ hw_max }}W max{% if mode == 'charge' %}{% if lim2 > 0 and soc >= thr2 %} ⚠ slow: {{ lim2 }}W cap{% elif lim1 > 0 and soc >= thr1 %} ⚠ slow: {{ lim1 }}W cap{% endif %}{% endif %}
              {%- endif %}
              {% endfor %}
            visibility:
              - condition: state
                entity: input_boolean.hba_control_is_debug_mode
                state: "on"
          - type: markdown
            content: |-
              {% set cheap_s = states('input_datetime.hba_strategy_dynamic_cheapest_start') -%}
              {% set cheap_e = states('input_datetime.hba_strategy_dynamic_cheapest_end') -%}
              {% set exp_s = states('input_datetime.hba_strategy_dynamic_expensive_start') -%}
              {% set exp_e = states('input_datetime.hba_strategy_dynamic_expensive_end') -%}
              {% set mark_now = state_attr('sensor.hba_energy_prices_data', 'mark_now') | default('unknown') -%}
              {% set cheap_strat = states('input_select.hba_strategy_dynamic_cheapest') -%}
              {% set exp_strat = states('input_select.hba_strategy_dynamic_expensive') -%}
              {% set def_strat = states('input_select.hba_strategy_dynamic_default') -%}
              {% set cheap_met = is_state('binary_sensor.hba_dynamic_cheap_threshold_met', 'on') -%}
              {% set exp_met = is_state('binary_sensor.hba_dynamic_expensive_threshold_met', 'on') -%}
              {% set strategy = states('input_select.hba_strategy') -%}
              **Dynamic pricing — now**
              Mark: **{{ mark_now }}**{% if strategy == 'Dynamic' %} | Cheap threshold: {{ '✅ met' if cheap_met else '❌ not met (SKIP)' }} | Exp. threshold: {{ '✅ met' if exp_met else '❌ not met (SKIP)' }}{% endif %}

              🟢 Cheap → **{{ cheap_strat }}** ({{ cheap_s[11:16] if cheap_s | length > 15 else '?' }} – {{ cheap_e[11:16] if cheap_e | length > 15 else '?' }})
              🟠 Expensive → **{{ exp_strat }}** ({{ exp_s[11:16] if exp_s | length > 15 else '?' }} – {{ exp_e[11:16] if exp_e | length > 15 else '?' }})
              — Default → **{{ def_strat }}**
            visibility:
              - condition: state
                entity: input_boolean.hba_control_is_debug_mode
                state: "on"
              - condition: or
                conditions:
                  - condition: state
                    entity: input_select.hba_strategy
                    state: "Dynamic"
                  - condition: state
                    entity: input_select.hba_strategy
                    state: "Dynamic v2"


  # ── VIEW 6: ADVANCED SETTINGS ───────────────────────────────────────────────
  - type: sections
    max_columns: 3
    title: Advanced settings
    path: advanced-settings
    icon: mdi:cog-outline
    cards: []
    badges:
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: input_select.hba_strategy
        name: Choose strategy
        tap_action:
          action: more-info
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.hba_active_strategy
        show_entity_picture: false
        name: Executing
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: input_text.hba_strategy_active_flow
        show_entity_picture: false
        name: Flow
    header:
      layout: center
      badges_position: top
      badges_wrap: scroll
      card:
        type: markdown
        text_only: true
        content: '### Advanced settings *(HBA v4.10.0-r1)*'
    sections:
      # Battery offline warning — full width, hidden when all batteries are online
      - type: grid
        column_span: 3
        visibility:
          - condition: state
            entity: binary_sensor.hba_any_battery_offline
            state: "on"
        cards:
          - type: markdown
            content: >
              {% set count = states('input_number.hba_battery_count') | int(1) %}
              {% set ns = namespace(offline=[]) %}
              {% for i in range(1, count + 1) %}
                {% set inv = states('sensor.marstek_m' ~ i ~ '_inverter_state') %}
                {% if inv in ['unavailable', 'unknown', ''] %}
                  {% set ns.offline = ns.offline + ['M' ~ i] %}
                {% endif %}
              {% endfor %}
              <ha-alert alert-type="error">Battery {{ ns.offline | join(', ') }} offline — check connectivity or reduce battery count in settings.</ha-alert>
      - type: grid
        cards:
          - type: heading
            heading: General
            heading_style: title
            icon: mdi:home
          - type: entities
            entities:
              - entity: input_number.hba_battery_count
          - type: tile
            entity: input_boolean.hba_control_onboarding_finished
            name: Show/Hide onboarding
            icon: mdi:eye-off-outline
            color: disabled
            show_entity_picture: false
            hide_state: true
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
            grid_options:
              columns: full

      - type: grid
        cards:
          - type: heading
            heading: Battery life
            heading_style: title
            icon: mdi:medication
          - type: heading
            icon: mdi:information
            heading: Cycle which battery to charge first
            heading_style: subtitle
            tap_action:
              action: url
              url_path: >-
                https://docs.homebatterycontrol.com/06-advanced-features.html#battery-life
          - show_name: true
            show_icon: true
            show_state: true
            type: glance
            entities:
              - entity: input_number.hba_control_prioritize_battery
                name: 'Battery #'
              - entity: input_select.hba_control_priority_change_interval
            state_color: false
            columns: 3
          - type: heading
            icon: mdi:information
            heading: Optimize stop and go behavior
            heading_style: subtitle
            tap_action:
              action: url
              url_path: >-
                https://docs.homebatterycontrol.com/06-advanced-features.html#battery-life
          - type: entities
            entities:
              - entity: input_number.hba_control_idle_time
                name: Stop after Idle for
              - entity: input_number.hba_control_hysteresis_in_w
                name: 'Hysteresis '
                secondary_info: none
          - type: markdown
            content: >-
              <font color="grey"><i>Recommended: **Kp × 50 W** (e.g. Kp=0.7 →
              35 W, round up to 50 W). Too low causes charge/discharge
              oscillation near the setpoint; too high prevents small
              corrections.</i></font>
            text_only: true

      - type: grid
        cards:
          - type: heading
            heading: EV Stop Trigger
            heading_style: title
            icon: mdi:power-plug-off
          - type: markdown
            content: >-
              <font color=grey>The Stop Trigger will OVERRULE ALL active
              strategies.

              _E.g. use to disengage your home batteries when EV is
              charging_</font>
            text_only: true
          - type: entities
            entities:
              - entity: input_text.hba_strategy_ev_sensor_entity_id
                secondary_info: none
          - type: markdown
            content: >-
              <font color=grey>Enter the `entity_id` of an `input_boolean` or
              `on/off template_sensor` in the field above</font>
            text_only: true
          - type: tile
            entity: binary_sensor.hba_ev_is_active
            name: EV stop trigger
            vertical: false
            features_position: bottom
            grid_options:
              columns: full
          - type: markdown
            content: >-
              <font color=grey>The EV stop trigger should indicate whether a
              Full Stop has been triggered. Trigger **on** = batteries in Full
              stop.</font>
            text_only: true
          - type: tile
            entity: input_boolean.hba_control_has_power_limit_during_ev_charge
            name: Keep peak shaving active during EV stop
            color: blue
            vertical: false
            hide_state: true
            features_position: bottom
            grid_options:
              columns: full
          - type: markdown
            content: >-
              <font color=grey>When enabled, batteries still respond to import/export
              power limits while the EV stop trigger is active (uses Standby / peak
              shave strategy instead of Full stop).</font>
            text_only: true

      - type: grid
        column_span: 3
        cards:
          - type: heading
            icon: mdi:transmission-tower
            heading: Grid power limits & peak shaving
            heading_style: title
          - type: markdown
            content: '---'
            grid_options:
              columns: full
            text_only: true
          - type: heading
            icon: mdi:information
            heading: Peak shaving
            heading_style: subtitle
            tap_action:
              action: url
              url_path: >-
                https://docs.homebatterycontrol.com/06-advanced-features.html#peak-shaving
          - type: markdown
            content: >-
              <font color=grey><i>Use your batteries to reduce peak loads and
              reduce 'capacity tariff' (aka CAPTAR). When enabled, the batteries
              will automatically charge or discharge (when able) to reduce peak
              loads on your **grid connection**. Active during every strategy
              except "`Full Stop`"</i>

              </font>
            text_only: true
            grid_options:
              columns: full

      - type: grid
        column_span: 1
        cards:
          - type: heading
            icon: mdi:transmission-tower-import
            heading: Grid power limit during import from grid (CAPTAR)
            heading_style: subtitle
          - type: entities
            entities:
              - entity: input_boolean.hba_control_has_power_limit_import
              - type: conditional
                conditions:
                  - entity: input_boolean.hba_control_has_power_limit_import
                    state: 'on'
                row:
                  entity: input_number.hba_control_power_limit_import
                  icon: mdi:home-import-outline
          - type: markdown
            content: >-
              <font color=grey><i>This also determines **Charge strategy**
              speed</i>

              </font>
            text_only: true
            grid_options:
              columns: full

      - type: grid
        cards:
          - type: heading
            icon: mdi:transmission-tower-export
            heading: Grid power limit during export to grid
            heading_style: subtitle
          - type: entities
            entities:
              - entity: input_boolean.hba_control_has_power_limit_export
              - type: conditional
                conditions:
                  - entity: input_boolean.hba_control_has_power_limit_export
                    state: 'on'
                row:
                  entity: input_number.hba_control_power_limit_export
          - type: markdown
            content: >-
              <font color=grey><i>This also determines **Sell strategy**
              discharge speed.</i>

              </font>
            text_only: true
            grid_options:
              columns: full

      - type: grid
        column_span: 3
        cards:
          - type: markdown
            content: '---'
            grid_options:
              columns: full
            text_only: true

      # Slow charge — battery health
      - type: grid
        column_span: 3
        cards:
          - type: heading
            icon: mdi:battery-heart-variant
            heading: Battery health — slow charge near full SoC
            heading_style: title
          - type: markdown
            content: >-
              <font color=grey><i>Reduces charge power when a battery's SoC
              exceeds each threshold, to protect cell health at high charge
              levels. Two configurable levels — the stricter limit wins when
              both thresholds are exceeded. Set either **power limit to 0 W**
              to disable that level and let the BMS handle the taper
              instead.</i>

              </font>
            text_only: true
            grid_options:
              columns: full

      - type: grid
        column_span: 1
        cards:
          - type: heading
            icon: mdi:speedometer-slow
            heading: Slow charge level 1
            heading_style: subtitle
          - type: entities
            entities:
              - entity: input_number.hba_control_slow_charge_soc_threshold_1
                name: SoC threshold
              - entity: input_number.hba_control_slow_charge_power_limit_1
                name: Max charge power (0 = disabled)

      - type: grid
        cards:
          - type: heading
