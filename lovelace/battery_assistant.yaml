              - entity: input_text.hba_strategy_solar_forecast_tomorrow_entity_id
                name: Solar forecast sensor (kWh tomorrow) [entity_id]
            show_header_toggle: false
            visibility:
              - condition: state
                entity: input_select.hba_strategy_charge_goal
                state: solar forecast
          - type: markdown
            content: >-
              <font color=grey>_'Reserve' is usable energy in your batteries
