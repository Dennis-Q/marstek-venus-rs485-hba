          - type: heading
            icon: mdi:timeline-clock-outline
            heading: Cheapest period
            heading_style: subtitle
          - type: entities
            entities:
              - entity: input_select.hba_strategy_dynamic_cheapest
                name: I want to use
              - entity: input_number.hba_strategy_dynamic_cheapest_hrs
                name: During the cheapest
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_select.hba_strategy
                    state_not: "Dynamic v2"
                row:
                  entity: input_number.hba_strategy_dynamic_threshold_cheapest_period
                  name: If the tariff is below
                  icon: mdi:download-circle-outline
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_select.hba_strategy
                    state_not: "Dynamic v2"
                row:
                  entity: input_datetime.hba_strategy_dynamic_cheapest_start
                  type: simple-entity
                  name: Start
              - type: conditional
                conditions:
                  - condition: state
                    entity: input_select.hba_strategy
                    state_not: "Dynamic v2"
                row:
                  entity: input_datetime.hba_strategy_dynamic_cheapest_end
                  type: simple-entity
                  name: End
              - type: conditional
                conditions:
