            grid_options:
              columns: 3
              rows: 1
            title: Time
            face_style: markers
          - type: entities
            entities:
              - entity: input_number.hba_strategy_dynamic_threshold_delta
                name: Min. price difference
              - entity: sensor.hba_energy_prices_data
                type: attribute
                attribute: mark_now
                name: Current period
