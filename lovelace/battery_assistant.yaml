views:
  # ── VIEW 1: HOME ────────────────────────────────────────────────────────────
  - type: sections
    path: hba-overview
    title: Home Battery Assistant
    icon: mdi:home
    max_columns: 3
    header:
      card:
        type: markdown
        content: '### Home Battery Assistant *(HBA v4.10.0-r1)*'
        text_only: true
    cards: []
    sections:

      # Battery offline warning — full width, hidden when all batteries are online
      - type: grid
        column_span: 3
        visibility:
          - condition: state
            entity: binary_sensor.hba_any_battery_offline
            state: "on"
        cards:
          - type: markdown
            content: >
              {% set count = states('input_number.hba_battery_count') | int(1) %}
              {% set ns = namespace(offline=[]) %}
              {% for i in range(1, count + 1) %}
                {% set inv = states('sensor.marstek_m' ~ i ~ '_inverter_state') %}
                {% if inv in ['unavailable', 'unknown', ''] %}
                  {% set ns.offline = ns.offline + ['M' ~ i] %}
                {% endif %}
              {% endfor %}
              <ha-alert alert-type="error">Battery {{ ns.offline | join(', ') }} offline — check connectivity or reduce battery count in settings.</ha-alert>

      # Version mismatch warning — full width, hidden when versions match
      - type: grid
        column_span: 3
        visibility:
          - condition: template
            value_template: >
              {{ states('sensor.hba_version') not in ['unavailable', 'unknown', '']
                 and states('sensor.hba_version') != 'v4.10.1-r3' }}
        cards:
          - type: markdown
            content: >
              <ha-alert alert-type="warning">**HBA version mismatch** — Dashboard is
              v4.10.1-r3 but loaded packages report
              {{ states('sensor.hba_version') }}. Reload YAML to apply the update:
              Developer Tools → YAML → Reload All YAML.</ha-alert>

      # Onboarding (hidden once dismissed)
      - type: grid
        visibility:
          - condition: not
            conditions:
              - condition: state
                entity: input_boolean.hba_control_onboarding_finished
                state: 'on'
        cards:
          - type: heading
            heading: Onboarding
            heading_style: title
            icon: mdi:cog-outline
          - type: markdown
            content: '### Step 1'
            text_only: true
          - type: markdown
            content: >-
              <ha-alert title="Apply default settings">Set all HBA parameters
              to safe starting values before you begin configuring. You can
              re-apply defaults any time from Advanced Settings.</ha-alert>
            text_only: true
            grid_options:
              columns: full
            visibility:
              - condition: numeric_state
                entity: input_number.hba_control_kp
                below: 0.01
          - type: button
            name: Apply defaults
            icon: mdi:cog-refresh
            show_name: true
            show_icon: true
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.hba_apply_defaults
              confirmation:
                text: >-
                  This will set all HBA parameters to safe starting values. Any
                  values you have already configured will be overwritten.
                  Continue?
            visibility:
              - condition: numeric_state
                entity: input_number.hba_control_kp
                below: 0.01
          - type: markdown
            content: >-
              <ha-alert title="Default settings applied"
              alert-type="success">HBA is using safe starting values.</ha-alert>
            text_only: true
            grid_options:
              columns: full
            visibility:
              - condition: numeric_state
                entity: input_number.hba_control_kp
                above: 0
          - type: markdown
            content: '### Step 2'
            text_only: true
          - type: entities
            entities:
              - entity: input_number.hba_battery_count
          - type: markdown
            content: '### Step 3'
            text_only: true
          - type: markdown
            content: >-
              <ha-alert title="Grid Power Sensor"
              alert-type="success">Configured — using sensor.p1_meter_power.</ha-alert>
            visibility:
              - condition: not
                conditions:
                  - condition: or
                    conditions:
                      - condition: state
                        entity: sensor.p1_meter_power
                        state: unavailable
                      - condition: state
                        entity: sensor.p1_meter_power
                        state: unknown
          - type: markdown
            content: >-
              <ha-alert title="Setup Grid Power Sensor">Configure your P1 power
              sensor</ha-alert>

              Edit `packages/hba_config.yaml` and set your grid power sensor.
            visibility:
              - condition: or
                conditions:
                  - condition: state
                    entity: sensor.p1_meter_power
                    state: unavailable
                  - condition: state
                    entity: sensor.p1_meter_power
                    state: unknown
          - type: markdown
            content: '### Step 4'
            text_only: true
          - type: markdown
            content: >-
              <ha-alert title="Battery M1 connected"
              alert-type="success">Modbus TCP connection active.</ha-alert>
            visibility:
              - condition: not
                conditions:
                  - condition: or
                    conditions:
                      - condition: state
                        entity: sensor.marstek_m1_inverter_state
                        state: unknown
                      - condition: state
                        entity: sensor.marstek_m1_inverter_state
                        state: unavailable
          - type: markdown
            content: >-
              <ha-alert title="Set battery IP addresses">Edit
              **packages/marstek_m1_modbus_tcp.yaml** (and m2/m3) and set the correct IP for each battery.</ha-alert>
            visibility:
              - condition: or
                conditions:
                  - condition: state
                    entity: sensor.marstek_m1_inverter_state
                    state: unknown
                  - condition: state
                    entity: sensor.marstek_m1_inverter_state
                    state: unavailable
          - type: markdown
            content: '### Step 5'
            text_only: true
          - type: markdown
            content: >-
              <ha-alert title="(Optional) review power limits"> Use limits and
              peak shaving to reduce peaks and overload risk.</ha-alert>
            visibility:
              - condition: and
                conditions:
                  - condition: state
                    entity: input_boolean.hba_control_has_power_limit_import
                    state_not: 'on'
                  - condition: state
                    entity: input_boolean.hba_control_has_power_limit_export
                    state_not: 'on'
          - type: heading
            icon: mdi:cog-outline
            heading: Review power limits
            heading_style: subtitle
            tap_action:
              action: navigate
              navigation_path: /home-battery-assistant/advanced-settings
            visibility:
              - condition: and
                conditions:
                  - condition: state
                    entity: input_boolean.hba_control_has_power_limit_import
                    state_not: 'on'
                  - condition: state
                    entity: input_boolean.hba_control_has_power_limit_export
                    state_not: 'on'
          - type: markdown
            content: >-
              <ha-alert title="Power limits" alert-type="success">Batteries
              will help prevent peaks and overloads, when able.</ha-alert>
            visibility:
              - condition: or
                conditions:
                  - condition: state
                    entity: input_boolean.hba_control_has_power_limit_import
                    state: 'on'
                  - condition: state
                    entity: input_boolean.hba_control_has_power_limit_export
                    state: 'on'
          - type: markdown
            content: '### Step 6'
            text_only: true
          - type: markdown
            content: >-
              Set the Master Battery Control to `Full Control` after reviewing
              all installation instructions. Pick a battery charging strategy
              e.g. `self-consumption`, choose controller sensitivity `very safe`
              and you are done!
          - show_name: false
            show_icon: true
            type: button
            entity: input_boolean.hba_control_onboarding_finished
            grid_options:
              columns: 2
              rows: 1
            icon: mdi:eye-off-outline
            hold_action:
              action: toggle
            icon_height: 25px
          - type: markdown
            text_only: true
            grid_options:
              columns: 9
              rows: 1
            content: |-
              ---
              Hide onboarding
          - type: markdown
            content: >-
              _You can find battery settings and unhide onboarding on the
              settings tab._
            grid_options:
              columns: full
              rows: auto
            text_only: true

      # Master Battery Control
      - type: grid
        cards:
          - type: heading
            heading: Master Battery Control
            heading_style: title
            icon: mdi:gamepad-variant-outline
          - type: markdown
            content: >-
              <ha-alert alert-type="error">EV is charging — Full Stop strategy
              is active.</ha-alert>
            text_only: true
            grid_options:
              columns: full
            visibility:
              - condition: state
                entity: binary_sensor.hba_ev_is_active
                state: 'on'
              - condition: state
                entity: input_select.hba_marstek_master_battery_mode
                state: Full control
          - type: markdown
            content: >-
              <ha-alert alert-type="error">HBA disabled — conflict with HBC was
              detected. Use the buttons below to resume.</ha-alert>
            text_only: true
            grid_options:
              columns: full
            visibility:
              - condition: state
                entity: input_boolean.hba_safety_lockout
                state: 'on'
          - type: markdown
            content: >-
              <ha-alert alert-type="warning">Node-RED (HBC) is running — use
              the buttons below to hand off control.</ha-alert>
            text_only: true
            grid_options:
              columns: full
            visibility:
              - condition: state
                entity: binary_sensor.hba_hbc_node_red_running
                state: 'on'
          - type: markdown
            content: >-
              <ha-alert alert-type="warning">HBC automations are enabled — HBC
              may be managing your batteries. Use the buttons below to hand
              off.</ha-alert>
            text_only: true
            grid_options:
              columns: full
            visibility:
              - condition: state
                entity: binary_sensor.hba_hbc_automations_active
                state: 'on'
          - type: markdown
            content: >-
              <ha-alert alert-type="warning">HBC (House Battery Control) is in
              Full Control — it may be managing your batteries. Use the buttons
              below to hand off.</ha-alert>
            text_only: true
            grid_options:
              columns: full
            visibility:
              - condition: state
                entity: input_select.marstek_master_battery_mode
                state: Full control
          - type: horizontal-stack
            cards:
              - type: button
                name: Take control (HBA)
                icon: mdi:home-battery
                show_name: true
                show_icon: true
                tap_action:
                  action: perform-action
                  perform_action: script.turn_on
                  target:
                    entity_id: script.hba_take_control
              - type: button
                name: Yield to HBC
                icon: mdi:transit-connection-variant
                show_name: true
                show_icon: true
                tap_action:
                  action: perform-action
                  perform_action: script.turn_on
                  target:
                    entity_id: script.hba_yield_to_hbc
            visibility:
              - condition: or
                conditions:
                  - condition: state
                    entity: binary_sensor.hba_hbc_node_red_running
                    state: 'on'
                  - condition: state
                    entity: input_boolean.hba_safety_lockout
                    state: 'on'
                  - condition: state
                    entity: binary_sensor.hba_hbc_automations_active
                    state: 'on'
                  - condition: state
                    entity: input_select.marstek_master_battery_mode
                    state: Full control
          - features:
              - type: select-options
            type: tile
            entity: input_select.hba_marstek_master_battery_mode
            features_position: bottom
            vertical: false
            show_entity_picture: false
            hide_state: true
            name: Control Mode
            icon: mdi:camera-control
          - type: tile
            entity: input_select.hba_strategy
            name: Choose strategy
            show_entity_picture: false
            hide_state: true
            vertical: false
            features:
              - type: select-options
            features_position: bottom
            visibility:
              - condition: state
                entity: input_select.hba_marstek_master_battery_mode
                state: Full control
          - type: heading
            icon: mdi:alert
            heading: 'Dynamic/Dynamic v2: configure dynamic strategy first'
            heading_style: subtitle
            tap_action:
              action: navigate
              navigation_path: /home-battery-assistant/timed-dynamic
            visibility:
              - condition: or
                conditions:
                  - condition: state
                    entity: input_select.hba_strategy
                    state: Dynamic
                  - condition: state
                    entity: input_select.hba_strategy
                    state: "Dynamic v2"
              - condition: state
                entity: input_select.hba_marstek_master_battery_mode
                state: Full control
          - type: heading
            icon: mdi:information-slab-circle
            heading: About strategies
            heading_style: subtitle
            tap_action:
              action: url
              url_path: https://docs.homebatterycontrol.com/03-strategies.html
          - type: entities
            entities:
              - entity: sensor.hba_active_strategy
                type: simple-entity
                name: Executing
              - entity: input_text.hba_strategy_active_flow
                type: simple-entity
                name: Flow
            grid_options:
              columns: 12
              rows: auto
            show_header_toggle: false
            state_color: false
            no_background: true
            visibility:
              - condition: state
                entity: input_select.hba_marstek_master_battery_mode
                state: Full control
          - type: history-graph
            entities:
              - entity: input_select.hba_strategy
                name: Chosen strategy
              - entity: sensor.hba_active_strategy
                name: Executing
              - entity: input_text.hba_strategy_active_flow
                name: Flow
            visibility:
              - condition: state
                entity: input_select.hba_marstek_master_battery_mode
                state: Full control
            hours_to_show: 12
          - type: markdown
            content: |-
              <font color="grey">

              #### Your energy and battery usage</font>
            text_only: true
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: input_number.hba_battery_count
                above: 0
                below: 2
            card:
              type: history-graph
              hours_to_show: 0.05
              entities:
                - entity: input_number.hba_control_pid_output
                  name: PID control
                - entity: sensor.p1_meter_power
                  name: Grid power
                - entity: select.marstek_m1_forcible_charge_discharge
                  name: M1
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: input_number.hba_battery_count
                above: 1
                below: 3
            card:
              type: history-graph
              hours_to_show: 0.05
              entities:
                - entity: input_number.hba_control_pid_output
                  name: PID control
                - entity: sensor.p1_meter_power
                  name: Grid power
                - entity: select.marstek_m1_forcible_charge_discharge
                  name: M1
                - entity: select.marstek_m2_forcible_charge_discharge
                  name: M2
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: input_number.hba_battery_count
                above: 2
                below: 4
            card:
              type: history-graph
              hours_to_show: 0.05
              entities:
                - entity: input_number.hba_control_pid_output
                  name: PID control
                - entity: sensor.p1_meter_power
                  name: Grid power
                - entity: select.marstek_m1_forcible_charge_discharge
                  name: M1
                - entity: select.marstek_m2_forcible_charge_discharge
                  name: M2
                - entity: select.marstek_m3_forcible_charge_discharge
                  name: M3
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: input_number.hba_battery_count
                above: 3
                below: 5
            card:
              type: history-graph
              hours_to_show: 0.05
              entities:
                - entity: input_number.hba_control_pid_output
                  name: PID control
                - entity: sensor.p1_meter_power
                  name: Grid power
                - entity: select.marstek_m1_forcible_charge_discharge
                  name: M1
                - entity: select.marstek_m2_forcible_charge_discharge
                  name: M2
                - entity: select.marstek_m3_forcible_charge_discharge
                  name: M3
                - entity: select.marstek_m4_forcible_charge_discharge
                  name: M4
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: input_number.hba_battery_count
                above: 4
                below: 6
            card:
              type: history-graph
              hours_to_show: 0.05
              entities:
                - entity: input_number.hba_control_pid_output
                  name: PID control
                - entity: sensor.p1_meter_power
                  name: Grid power
                - entity: select.marstek_m1_forcible_charge_discharge
                  name: M1
                - entity: select.marstek_m2_forcible_charge_discharge
                  name: M2
                - entity: select.marstek_m3_forcible_charge_discharge
                  name: M3
                - entity: select.marstek_m4_forcible_charge_discharge
                  name: M4
                - entity: select.marstek_m5_forcible_charge_discharge
                  name: M5
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: input_number.hba_battery_count
                above: 5
            card:
              type: history-graph
              hours_to_show: 0.05
              entities:
                - entity: input_number.hba_control_pid_output
                  name: PID control
                - entity: sensor.p1_meter_power
                  name: Grid power
                - entity: select.marstek_m1_forcible_charge_discharge
                  name: M1
                - entity: select.marstek_m2_forcible_charge_discharge
                  name: M2
                - entity: select.marstek_m3_forcible_charge_discharge
                  name: M3
                - entity: select.marstek_m4_forcible_charge_discharge
                  name: M4
                - entity: select.marstek_m5_forcible_charge_discharge
                  name: M5
                - entity: select.marstek_m6_forcible_charge_discharge
                  name: M6
          - type: heading
            icon: mdi:information
            heading: Self-consumption
            heading_style: subtitle
            tap_action:
              action: navigate
              navigation_path: /home-battery-assistant/self-consumption
          - type: markdown
            content: >-
              <ha-alert alert-type="warning">High controller sensitivity,
              monitor your system.</ha-alert>
            visibility:
              - condition: or
                conditions:
                  - condition: numeric_state
                    entity: input_number.hba_control_kp
                    above: 0.5
                  - condition: numeric_state
                    entity: input_number.hba_control_ki
                    above: 0.5
                  - condition: numeric_state
                    entity: input_number.hba_control_kd
                    above: 0.5
                  - condition: numeric_state
                    entity: input_number.hba_control_error_signal_dampening
                    above: 70
                  - condition: numeric_state
                    entity: input_number.hba_control_pid_output_dampening
                    above: 50
            text_only: true
          - type: entities
            entities:
              - entity: input_select.hba_control_pid_presets
                name: Controller sensitivity
          - type: heading
            icon: ''
            heading: Configure custom values
            heading_style: subtitle
            tap_action:
              action: navigate
              navigation_path: /home-battery-assistant/self-consumption

      # Battery status
      - type: grid
        cards:
          - type: heading
            heading: Basic battery information
            heading_style: title
            icon: mdi:home-battery-outline
          - type: tile
            entity: sensor.hba_time_remaining
            name: Battery remaining
            icon: mdi:battery-clock
            show_entity_picture: false
            hide_state: false
            vertical: false
            features_position: bottom
            grid_options:
              columns: full
              rows: 1
          - type: heading
            heading: Marstek M1
            heading_style: subtitle
            icon: ''
            visibility:
              - condition: state
                entity: sensor.marstek_m1_device_name
                state_not: unknown
          - type: glance
            entities:
              - entity: sensor.marstek_m1_battery_state_of_charge
                name: M1 SoC
              - entity: sensor.marstek_m1_ac_power
                name: M1 Power
              - entity: number.marstek_m1_max_charge_power
                name: Max Charge
              - entity: number.marstek_m1_max_discharge_power
                name: Max Discharge
            visibility:
              - condition: state
                entity: sensor.marstek_m1_device_name
                state_not: unknown
          - type: heading
            heading: Marstek M2
            heading_style: subtitle
            icon: ''
            visibility:
              - condition: and
                conditions:
                  - condition: state
                    entity: sensor.marstek_m2_device_name
                    state_not: unknown
                  - condition: numeric_state
                    entity: input_number.hba_battery_count
                    above: 1
          - type: glance
            entities:
              - entity: sensor.marstek_m2_battery_state_of_charge
                name: M2 SoC
              - entity: sensor.marstek_m2_ac_power
                name: M2 Power
              - entity: number.marstek_m2_max_charge_power
                name: Max Charge
              - entity: number.marstek_m2_max_discharge_power
                name: Max Discharge
            visibility:
              - condition: and
                conditions:
                  - condition: state
                    entity: sensor.marstek_m2_device_name
                    state_not: unknown
                  - condition: numeric_state
                    entity: input_number.hba_battery_count
                    above: 1
          - type: heading
            heading: Marstek M3
            heading_style: subtitle
            icon: ''
            visibility:
              - condition: and
                conditions:
                  - condition: state
                    entity: sensor.marstek_m3_device_name
                    state_not: unknown
                  - condition: numeric_state
                    entity: input_number.hba_battery_count
                    above: 2
          - type: glance
            entities:
              - entity: sensor.marstek_m3_battery_state_of_charge
                name: M3 SoC
              - entity: sensor.marstek_m3_ac_power
                name: M3 Power
              - entity: number.marstek_m3_max_charge_power
                name: Max Charge
              - entity: number.marstek_m3_max_discharge_power
                name: Max Discharge
            visibility:
              - condition: and
                conditions:
                  - condition: state
                    entity: sensor.marstek_m3_device_name
                    state_not: unknown
                  - condition: numeric_state
                    entity: input_number.hba_battery_count
                    above: 2
          - type: heading
            heading: Marstek M4
            heading_style: subtitle
            icon: ''
            visibility:
              - condition: and
                conditions:
                  - condition: state
                    entity: sensor.marstek_m4_device_name
                    state_not: unknown
                  - condition: numeric_state
                    entity: input_number.hba_battery_count
                    above: 3
          - type: glance
            entities:
              - entity: sensor.marstek_m4_battery_state_of_charge
                name: M4 SoC
              - entity: sensor.marstek_m4_ac_power
                name: M4 Power
              - entity: number.marstek_m4_max_charge_power
                name: Max Charge
              - entity: number.marstek_m4_max_discharge_power
                name: Max Discharge
            visibility:
              - condition: and
                conditions:
                  - condition: state
                    entity: sensor.marstek_m4_device_name
                    state_not: unknown
                  - condition: numeric_state
                    entity: input_number.hba_battery_count
                    above: 3
          - type: heading
            heading: Marstek M5
            heading_style: subtitle
            icon: ''
            visibility:
              - condition: and
                conditions:
                  - condition: state
                    entity: sensor.marstek_m5_device_name
                    state_not: unknown
                  - condition: numeric_state
                    entity: input_number.hba_battery_count
                    above: 4
          - type: glance
            entities:
              - entity: sensor.marstek_m5_battery_state_of_charge
                name: M5 SoC
              - entity: sensor.marstek_m5_ac_power
                name: M5 Power
              - entity: number.marstek_m5_max_charge_power
                name: Max Charge
              - entity: number.marstek_m5_max_discharge_power
                name: Max Discharge
            visibility:
              - condition: and
                conditions:
                  - condition: state
                    entity: sensor.marstek_m5_device_name
                    state_not: unknown
                  - condition: numeric_state
                    entity: input_number.hba_battery_count
                    above: 4
          - type: heading
            heading: Marstek M6
            heading_style: subtitle
            icon: ''
            visibility:
              - condition: and
                conditions:
                  - condition: state
                    entity: sensor.marstek_m6_device_name
                    state_not: unknown
                  - condition: numeric_state
                    entity: input_number.hba_battery_count
                    above: 5
          - type: glance
            entities:
              - entity: sensor.marstek_m6_battery_state_of_charge
                name: M6 SoC
              - entity: sensor.marstek_m6_ac_power
                name: M6 Power
              - entity: number.marstek_m6_max_charge_power
                name: Max Charge
              - entity: number.marstek_m6_max_discharge_power
                name: Max Discharge
            visibility:
              - condition: and
                conditions:
                  - condition: state
                    entity: sensor.marstek_m6_device_name
                    state_not: unknown
                  - condition: numeric_state
                    entity: input_number.hba_battery_count
                    above: 5
          - type: heading
            heading: Info and guides
            heading_style: title
