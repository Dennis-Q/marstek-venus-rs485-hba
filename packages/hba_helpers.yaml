template:
  - sensor:
      - name: "HBA Active strategy"
        unique_id: hba_strategy_active_sub_strategy
        icon: mdi:list-status
        state: >
          {% set flow = states('input_text.hba_strategy_active_flow') %}
          {% if flow in ['', 'unknown', 'unavailable'] %}
            {{ flow }}
          {% else %}
            {{ flow.split(' → ')[-1] }}
          {% endif %}

      - name: "HBA Total Battery Power"
        unique_id: hba_total_battery_power_in_w
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set count = states('input_number.hba_battery_count') | int(1) %}
          {% set ns = namespace(total=0) %}
          {% for i in range(1, count + 1) %}
            {% set ns.total = ns.total + states('sensor.marstek_m' ~ i ~ '_ac_power') | float(0) %}
          {% endfor %}
          {{ ns.total | round(0) | int }}

      - name: "HBA Total Commanded Power"
        unique_id: hba_total_commanded_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: mdi:flash
        state: >
          {% set count = states('input_number.hba_battery_count') | int(1) %}
          {% set ns = namespace(total=0) %}
          {% for i in range(1, count + 1) %}
            {% set mode = states('select.marstek_m' ~ i ~ '_forcible_charge_discharge') %}
            {% set cp = states('number.marstek_m' ~ i ~ '_forcible_charge_power') | float(0) %}
            {% set dp = states('number.marstek_m' ~ i ~ '_forcible_discharge_power') | float(0) %}
            {% if mode == 'charge' %}
              {% set ns.total = ns.total + cp %}
            {% elif mode == 'discharge' %}
              {% set ns.total = ns.total - dp %}
            {% endif %}
          {% endfor %}
          {{ ns.total | round(0) | int }}

      - name: "HBA Time Remaining"
        unique_id: hba_time_remaining
        icon: mdi:timer
        state: >
          {% set power = [states('sensor.hba_total_battery_power') | float(0), 0] | max %}
          {% set capacity_kwh = states('sensor.hba_charge_available_energy') | float(0) %}
          {% if power > 0 and capacity_kwh > 0 %}
            {% set time_hrs = (capacity_kwh * 1000) / power %}
            {% set hrs = time_hrs | int %}
            {% set minutes = ((time_hrs - hrs) * 60) | int %}
            {{ '{:02}:{:02}'.format(hrs, minutes) }} hours ({{ capacity_kwh | round(2) }} kWh)
          {% else %}
            Charging ({{ capacity_kwh | round(2) }} kWh)
          {% endif %}

      - name: "HBA Charge Remaining Energy"
        unique_id: hba_charge_remaining_energy
        unit_of_measurement: kWh
        device_class: energy_storage
        state_class: measurement
        state: >
          {% set count = states('input_number.hba_battery_count') | int(1) %}
          {% set ns = namespace(total=0) %}
          {% for i in range(1, count + 1) %}
            {% set soc = states('sensor.marstek_m' ~ i ~ '_battery_state_of_charge') | float(0) %}
            {% set cap = states('sensor.marstek_m' ~ i ~ '_battery_total_energy') | float(0) %}
            {% set soc_max = states('input_number.hba_marstek_m' ~ i ~ '_charging_cutoff_capacity') | float(100) %}
            {% set ns.total = ns.total + ([((soc_max - soc) / 100) * cap, 0] | max) %}
          {% endfor %}
          {{ ns.total | round(2) }}

      - name: "HBA Charge Available Energy"
        unique_id: hba_charge_available_energy
        unit_of_measurement: kWh
        device_class: energy_storage
        state_class: measurement
        state: >
          {% set count = states('input_number.hba_battery_count') | int(1) %}
          {% set ns = namespace(total=0) %}
          {% for i in range(1, count + 1) %}
            {% set soc = states('sensor.marstek_m' ~ i ~ '_battery_state_of_charge') | float(0) %}
            {% set cap = states('sensor.marstek_m' ~ i ~ '_battery_total_energy') | float(0) %}
            {% set soc_min = states('input_number.hba_marstek_m' ~ i ~ '_discharging_cutoff_capacity') | float(13) %}
            {% set ns.total = ns.total + ([((soc - soc_min) / 100) * cap, 0] | max) %}
          {% endfor %}
          {{ ns.total | round(2) }}

      - name: "HBA Total Max Charge Power"
        unique_id: hba_total_max_charge_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: mdi:flash-triangle
        state: >
          {% set count = states('input_number.hba_battery_count') | int(1) %}
          {% set ns = namespace(total=0) %}
          {% for i in range(1, count + 1) %}
            {% set pw = states('number.marstek_m' ~ i ~ '_max_charge_power') | float(0) %}
            {% set ns.total = ns.total + (pw if pw > 50 else 2500) %}
          {% endfor %}
          {{ ns.total | int }}

      - name: "HBA Total Max Discharge Power"
        unique_id: hba_total_max_discharge_power
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: mdi:flash-triangle
        state: >
          {% set count = states('input_number.hba_battery_count') | int(1) %}
          {% set ns = namespace(total=0) %}
          {% for i in range(1, count + 1) %}
            {% set pw = states('number.marstek_m' ~ i ~ '_max_discharge_power') | float(0) %}
            {% set ns.total = ns.total + (pw if pw > 50 else 2500) %}
          {% endfor %}
          {{ ns.total | int }}

      - name: "Estimated Profit per kWh"
        unique_id: hba_estimated_profit_per_kwh
        unit_of_measurement: "ct/kWh"
        icon: mdi:currency-eur
        state: >
          {% set delta = states('input_number.hba_strategy_dynamic_expensive_avg_delta') | float(0) %}
          {% set threshold = states('input_number.hba_strategy_dynamic_threshold_delta') | float(0) %}
          {{ [delta - threshold, 0] | max | round(2) }}

      # ── Solar forecast distribution sensors (used by Charge → solar forecast goal cards)
      - name: "HBA Solar Forecast Today"
        unique_id: hba_solar_forecast_today
        unit_of_measurement: kWh
        device_class: energy
        state_class: total
        icon: mdi:weather-sunny
        state: >
          {% set e = states('input_text.hba_strategy_solar_forecast_entity_id') | trim %}
          {{ states(e) | float(0) if e not in ['', 'unknown', 'unavailable'] else 0 }}

      - name: "HBA Solar Forecast Tomorrow"
        unique_id: hba_solar_forecast_tomorrow
        unit_of_measurement: kWh
        device_class: energy
        state_class: total
        icon: mdi:weather-sunny
        state: >
          {% set e = states('input_text.hba_strategy_solar_forecast_tomorrow_entity_id') | trim %}
          {{ states(e) | float(0) if e not in ['', 'unknown', 'unavailable'] else 0 }}

      - name: "HBA Solar Forecast Surplus Today"
        unique_id: hba_solar_forecast_surplus_today
        unit_of_measurement: kWh
        device_class: energy
        state_class: total
        icon: mdi:solar-power-variant
        state: >
          {% set e = states('input_text.hba_strategy_solar_forecast_entity_id') | trim %}
          {% set forecast = states(e) | float(0) if e not in ['', 'unknown', 'unavailable'] else 0 %}
          {% set reserved = states('input_number.hba_solar_reserved_for_house') | float(5) %}
          {{ [forecast - reserved, 0] | max | round(2) }}

      - name: "HBA Solar Forecast Surplus Tomorrow"
        unique_id: hba_solar_forecast_surplus_tomorrow
        unit_of_measurement: kWh
        device_class: energy
        state_class: total
        icon: mdi:solar-power-variant
        state: >
          {% set e = states('input_text.hba_strategy_solar_forecast_tomorrow_entity_id') | trim %}
          {% set forecast = states(e) | float(0) if e not in ['', 'unknown', 'unavailable'] else 0 %}
          {% set reserved = states('input_number.hba_solar_reserved_for_house') | float(5) %}
          {{ [forecast - reserved, 0] | max | round(2) }}

      - name: "HBA Charge Target Energy"
        unique_id: hba_charge_target_energy
        unit_of_measurement: kWh
        device_class: energy_storage
        state_class: measurement
        icon: mdi:battery-arrow-up
        state: >
          {% set count = states('input_number.hba_battery_count') | int(1) %}
          {% set ns = namespace(energy_max=0) %}
          {% for i in range(1, count + 1) %}
            {% set cap = states('sensor.marstek_m' ~ i ~ '_battery_total_energy') | float(0) %}
            {% set soc_max = states('input_number.hba_marstek_m' ~ i ~ '_charging_cutoff_capacity') | float(100) %}
            {% set soc_min = states('input_number.hba_marstek_m' ~ i ~ '_discharging_cutoff_capacity') | float(13) %}
            {% set ns.energy_max = ns.energy_max + (soc_max - soc_min) / 100 * cap %}
          {% endfor %}
          {% set e = states('input_text.hba_strategy_solar_forecast_entity_id') | trim %}
          {% set forecast = states(e) | float(0) if e not in ['', 'unknown', 'unavailable'] else 0 %}
          {% set threshold = states('input_number.hba_solar_reserved_for_house') | float(5) %}
          {% set solar_surplus = [forecast - threshold, 0] | max %}
          {{ [ns.energy_max - solar_surplus, 0] | max | round(2) }}

      - name: "HBA Charge Grid Energy Portion"
        unique_id: hba_charge_grid_energy_portion
        unit_of_measurement: kWh
        device_class: energy_storage
        state_class: measurement
        icon: mdi:transmission-tower
        state: >
          {% set count = states('input_number.hba_battery_count') | int(1) %}
          {% set ns = namespace(energy_max=0) %}
          {% for i in range(1, count + 1) %}
            {% set cap = states('sensor.marstek_m' ~ i ~ '_battery_total_energy') | float(0) %}
            {% set soc_max = states('input_number.hba_marstek_m' ~ i ~ '_charging_cutoff_capacity') | float(100) %}
            {% set soc_min = states('input_number.hba_marstek_m' ~ i ~ '_discharging_cutoff_capacity') | float(13) %}
            {% set ns.energy_max = ns.energy_max + (soc_max - soc_min) / 100 * cap %}
          {% endfor %}
          {% set e = states('input_text.hba_strategy_solar_forecast_entity_id') | trim %}
          {% set forecast = states(e) | float(0) if e not in ['', 'unknown', 'unavailable'] else 0 %}
          {% set threshold = states('input_number.hba_solar_reserved_for_house') | float(5) %}
          {% set solar_surplus = [forecast - threshold, 0] | max %}
          {% set energy_desired = [ns.energy_max - solar_surplus, 0] | max %}
          {% set available = states('sensor.hba_charge_available_energy') | float(0) %}
          {{ [energy_desired - available, 0] | max | round(2) }}

      - name: "HBA Charge Solar Energy Portion"
        unique_id: hba_charge_solar_energy_portion
        unit_of_measurement: kWh
        device_class: energy_storage
        state_class: measurement
        icon: mdi:solar-power
        state: >
          {% set count = states('input_number.hba_battery_count') | int(1) %}
          {% set ns = namespace(energy_max=0) %}
          {% for i in range(1, count + 1) %}
            {% set cap = states('sensor.marstek_m' ~ i ~ '_battery_total_energy') | float(0) %}
            {% set soc_max = states('input_number.hba_marstek_m' ~ i ~ '_charging_cutoff_capacity') | float(100) %}
            {% set soc_min = states('input_number.hba_marstek_m' ~ i ~ '_discharging_cutoff_capacity') | float(13) %}
            {% set ns.energy_max = ns.energy_max + (soc_max - soc_min) / 100 * cap %}
          {% endfor %}
          {% set e = states('input_text.hba_strategy_solar_forecast_entity_id') | trim %}
          {% set forecast = states(e) | float(0) if e not in ['', 'unknown', 'unavailable'] else 0 %}
          {% set threshold = states('input_number.hba_solar_reserved_for_house') | float(5) %}
          {% set solar_surplus = [forecast - threshold, 0] | max %}
          {% set charge_target = [ns.energy_max - solar_surplus, 0] | max %}
          {% set available = states('sensor.hba_charge_available_energy') | float(0) %}
          {% set filled = [charge_target, available] | max %}
          {{ [ns.energy_max - filled, 0] | max | round(2) if ns.energy_max > 0 else 0 }}

  - binary_sensor:
      - name: "HBA EV Is Active"
        unique_id: hba_ev_is_active
        icon: mdi:ev-station
        state: >
          {% set e = states('input_text.hba_strategy_ev_sensor_entity_id') | trim %}
          {{ states(e) == 'on' if e not in ['', 'unknown', 'unavailable'] else false }}
      - name: "HBA Dynamic Cheap Threshold Met"
        unique_id: hba_dynamic_cheap_threshold_met
        icon: mdi:check-circle
        state: >
          {% set avg = states('input_number.hba_strategy_dynamic_cheapest_avg_tariff') | float(999) %}
          {% set threshold = states('input_number.hba_strategy_dynamic_threshold_cheapest_period') | float(0) %}
          {{ avg <= threshold }}
      - name: "HBA Dynamic Expensive Threshold Met"
        unique_id: hba_dynamic_expensive_threshold_met
        icon: mdi:check-circle
        state: >
          {% set delta = states('input_number.hba_strategy_dynamic_expensive_avg_delta') | float(0) %}
          {% set threshold = states('input_number.hba_strategy_dynamic_threshold_delta') | float(0) %}
          {{ delta >= threshold }}
      - name: "HBA Is Charging"
        unique_id: hba_control_is_charging
        device_class: battery_charging
        icon: mdi:battery-charging
        state: "{{ states('sensor.hba_total_commanded_power') | float(0) > 0 }}"
      - name: "HBA Solar Surplus Covers Battery Capacity"
        unique_id: hba_solar_surplus_covers_battery_capacity
        icon: mdi:solar-power
        state: >
          {% set count = states('input_number.hba_battery_count') | int(1) %}
          {% set ns = namespace(energy_max=0) %}
          {% for i in range(1, count + 1) %}
            {% set cap = states('sensor.marstek_m' ~ i ~ '_battery_total_energy') | float(0) %}
            {% set soc_max = states('input_number.hba_marstek_m' ~ i ~ '_charging_cutoff_capacity') | float(100) %}
            {% set soc_min = states('input_number.hba_marstek_m' ~ i ~ '_discharging_cutoff_capacity') | float(13) %}
            {% set ns.energy_max = ns.energy_max + (soc_max - soc_min) / 100 * cap %}
          {% endfor %}
          {% set e = states('input_text.hba_strategy_solar_forecast_entity_id') | trim %}
          {% set forecast = states(e) | float(0) if e not in ['', 'unknown', 'unavailable'] else 0 %}
          {% set threshold = states('input_number.hba_solar_reserved_for_house') | float(5) %}
          {% set solar_surplus = [forecast - threshold, 0] | max %}
          {{ solar_surplus >= ns.energy_max }}
      - name: "HBA Solar Surplus Covers Battery Capacity Tomorrow"
        unique_id: hba_solar_surplus_covers_battery_capacity_tomorrow
        icon: mdi:solar-power
        state: >
          {% set count = states('input_number.hba_battery_count') | int(1) %}
          {% set ns = namespace(energy_max=0) %}
          {% for i in range(1, count + 1) %}
            {% set cap = states('sensor.marstek_m' ~ i ~ '_battery_total_energy') | float(0) %}
            {% set soc_max = states('input_number.hba_marstek_m' ~ i ~ '_charging_cutoff_capacity') | float(100) %}
            {% set soc_min = states('input_number.hba_marstek_m' ~ i ~ '_discharging_cutoff_capacity') | float(13) %}
            {% set ns.energy_max = ns.energy_max + (soc_max - soc_min) / 100 * cap %}
          {% endfor %}
          {% set e = states('input_text.hba_strategy_solar_forecast_tomorrow_entity_id') | trim %}
          {% set forecast = states(e) | float(0) if e not in ['', 'unknown', 'unavailable'] else 0 %}
          {% set threshold = states('input_number.hba_solar_reserved_for_house') | float(5) %}
          {% set solar_surplus = [forecast - threshold, 0] | max %}
          {{ solar_surplus >= ns.energy_max }}
      - name: "HBA Charge Goal Reached"
        unique_id: hba_strategy_charge_goal_reached
        icon: mdi:battery-check
        state: >
          {% if states('input_select.hba_strategy') != 'Charge' %}
            false
          {% else %}
            {% set count = states('input_number.hba_battery_count') | int(1) %}
            {% set goal = states('input_select.hba_strategy_charge_goal') %}
            {% if goal == 'batteries are full' %}
              {% set ns = namespace(full=true) %}
              {% for i in range(1, count + 1) %}
                {% set soc = states('sensor.marstek_m' ~ i ~ '_battery_state_of_charge') | float(0) %}
                {% set cutoff = states('input_number.hba_marstek_m' ~ i ~ '_charging_cutoff_capacity') | float(100) %}
                {% if soc < cutoff - 1 %}{% set ns.full = false %}{% endif %}
              {% endfor %}
              {{ ns.full }}
            {% elif goal == 'state of charge' %}
              {% set ns = namespace(total=0) %}
              {% for i in range(1, count + 1) %}
                {% set ns.total = ns.total + states('sensor.marstek_m' ~ i ~ '_battery_state_of_charge') | float(0) %}
              {% endfor %}
              {{ (ns.total / count) >= states('input_number.hba_strategy_charge_target_soc') | float(90) }}
            {% elif goal == 'energy reserve' %}
              {{ states('sensor.hba_charge_available_energy') | float(0) >= states('input_number.hba_strategy_charge_target_energy') | float(5) }}
            {% elif goal == 'solar forecast' %}
              {% set ns2 = namespace(energy_max=0) %}
              {% for i in range(1, count + 1) %}
                {% set cap = states('sensor.marstek_m' ~ i ~ '_battery_total_energy') | float(0) %}
                {% set soc_max = states('input_number.hba_marstek_m' ~ i ~ '_charging_cutoff_capacity') | float(100) %}
                {% set soc_min = states('input_number.hba_marstek_m' ~ i ~ '_discharging_cutoff_capacity') | float(13) %}
                {% set ns2.energy_max = ns2.energy_max + (soc_max - soc_min) / 100 * cap %}
              {% endfor %}
              {% set e_today = states('input_text.hba_strategy_solar_forecast_entity_id') | trim %}
              {% set forecast_kwh = states(e_today) | float(0) if e_today not in ['', 'unknown', 'unavailable'] else 0 %}
              {% set threshold = states('input_number.hba_solar_reserved_for_house') | float(5) %}
              {% set solar_surplus = [forecast_kwh - threshold, 0] | max %}
              {% set energy_desired = [ns2.energy_max - solar_surplus, 0] | max %}
              {{ states('sensor.hba_charge_available_energy') | float(0) >= energy_desired }}
            {% else %}
              false
            {% endif %}
          {% endif %}
      - name: "HBA Any Battery Offline"
        unique_id: hba_any_battery_offline
        icon: mdi:battery-alert
        state: >
          {% set count = states('input_number.hba_battery_count') | int(1) %}
          {% set ns = namespace(offline=false) %}
          {% for i in range(1, count + 1) %}
            {% set inv = states('sensor.marstek_m' ~ i ~ '_inverter_state') %}
            {% if inv in ['unavailable', 'unknown', ''] %}
              {% set ns.offline = true %}
            {% endif %}
          {% endfor %}
          {{ ns.offline }}

######################################################################################################
# RECORDER — LOGBOOK FILTERING
######################################################################################################
# Exclude high-frequency technical entities from the recorder to reduce database size.
recorder:
  exclude:
    entity_globs:
      # PID control terms and deviations (updated every ~1 s during operation)
      - input_number.hba_control_*_term
      - input_number.hba_control_*_deviation
      # Dynamic strategy calculated averages (updated hourly)
      - input_number.hba_strategy_dynamic_*_avg_*
    entities:
      # Debug value (updated frequently when debug mode is active)
      - input_number.hba_control_debug
      # Commanded power — updates on every battery write (~1 s during active control)
      - sensor.hba_total_commanded_power
      # Status field (updated every P1 cycle, ~1 s)
      - sensor.hba_time_remaining
      # Uncomment hba_control_pid_output to exclude (useful for PID graph in self-consumption view)
      - input_number.hba_control_error_signal    # updated every ~1 s during operation
      # - input_number.hba_control_pid_output      # useful for debugging PID behaviour
